<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Paper Analyzer</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #2f3b52;
        --muted: #4a5568;
        --primary: #3182ce;
        --primary-hover: #2a69ac;
        --success: #38a169;
        --success-hover: #276749;
        --warning: #d69e2e;
        --warning-hover: #b7791f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px;
        background: var(--card);
        border-radius: 12px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      form {
        margin-top: 20px;
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      label {
        font-size: 14px;
        color: var(--muted);
        font-weight: 600;
      }

      input[type="file"],
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e0;
        border-radius: 8px;
        background: #f7fafc;
      }

      .inline-row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .color-box {
        width: 42px;
        height: 42px;
        border: 1px solid #cbd5e0;
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
      }

      input[type="color"] {
        width: 100%;
        height: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      .color-value {
        font-family: Consolas, Menlo, Monaco, monospace;
        font-size: 13px;
        color: #2d3748;
        min-width: 82px;
      }

      .btn {
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 15px;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--primary);
      }

      .btn-primary:hover {
        background: var(--primary-hover);
      }

      .btn-success {
        background: var(--success);
      }

      .btn-success:hover {
        background: var(--success-hover);
      }

      .btn-warning {
        background: var(--warning);
      }

      .btn-warning:hover {
        background: var(--warning-hover);
      }

      .progress {
        height: 10px;
        border-radius: 6px;
        background: #e2e8f0;
        overflow: hidden;
        margin-top: 12px;
        position: relative;
      }

      .progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #4299e1, #63b3ed);
        animation: progress 1.4s linear infinite;
      }

      @keyframes progress {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(300%);
        }
      }

      .block {
        margin-top: 16px;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid #cbd5e0;
        white-space: pre-wrap;
        word-break: break-word;
        background: #f8fafc;
      }

      .error {
        border-color: #fc8181;
        background: #fff5f5;
        color: #c53030;
      }

      .video-tools {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid #cbd5e0;
        border-radius: 8px;
        background: #f8fafc;
      }

      .speed-options {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .speed-btn {
        padding: 8px 14px;
        border: 2px solid var(--warning);
        background: #fff;
        color: #744210;
        border-radius: 6px;
        cursor: pointer;
      }

      .speed-btn.selected {
        background: var(--warning);
        color: #fff;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PDF Paper Analyzer</h1>
      <p>上传 PDF/TXT/MD 后自动分析并生成可下载视频。</p>

      <form id="upload-form">
        <div class="field">
          <label for="file-input">文件</label>
          <input type="file" id="file-input" accept=".pdf,.txt,.md" required />
        </div>

        <div class="field">
          <label for="llm-base-url">LLM API 接口（可选）</label>
          <input id="llm-base-url" type="text" placeholder="例如: https://xxx/v1" />
        </div>

        <div class="field">
          <label for="llm-api-key">LLM API Key（可选）</label>
          <input id="llm-api-key" type="password" placeholder="sk-..." />
        </div>

        <div class="field">
          <label for="llm-model-name">LLM 模型名（可选）</label>
          <input id="llm-model-name" type="text" placeholder="例如: gpt-5-mini" />
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary">开始分析</button>
      </form>

      <div id="progress" class="progress hidden"><div class="progress-bar"></div></div>
      <div id="progress-steps" class="block hidden"></div>
      <div id="markdown" class="block hidden"></div>
      <div id="slides" class="block hidden"></div>
      <div id="voiceover" class="block hidden"></div>
      <div id="bundle" class="block hidden"></div>
      <div id="method-assets" class="block hidden"></div>
      <div id="images" class="block hidden"></div>
      <div id="error" class="block error hidden"></div>

      <div id="video-section" class="video-tools hidden">
        <div class="field">
          <label>视频背景颜色（用于 LaTeX 生成 PDF）</label>
          <div class="inline-row">
            <div class="color-box">
              <input type="color" id="bg-color" value="#ffffff" />
            </div>
            <span id="bg-color-value" class="color-value">#FFFFFF</span>
            <button id="btn-generate-video" type="button" class="btn btn-success">生成视频</button>
          </div>
        </div>

        <div id="video-progress-bar" class="progress hidden"><div class="progress-bar"></div></div>
        <div id="video-status" class="block hidden"></div>
        <a id="btn-download-video" class="btn btn-primary hidden" href="#" download>下载视频</a>

        <div id="speedup-section" class="hidden" style="margin-top: 16px">
          <div class="field">
            <label>视频加速</label>
            <div class="speed-options">
              <button class="speed-btn" type="button" data-speed="1.25">1.25x</button>
              <button class="speed-btn" type="button" data-speed="1.5">1.5x</button>
              <button class="speed-btn" type="button" data-speed="1.75">1.75x</button>
              <button class="speed-btn" type="button" data-speed="2">2x</button>
              <button class="speed-btn" type="button" data-speed="2.5">2.5x</button>
            </div>
            <button id="btn-generate-speedup" type="button" class="btn btn-warning" disabled>
              生成加速视频
            </button>
          </div>

          <div id="speedup-progress-bar" class="progress hidden"><div class="progress-bar"></div></div>
          <div id="speedup-status" class="block hidden"></div>
          <a id="btn-download-speedup" class="btn btn-primary hidden" href="#" download>
            下载加速视频
          </a>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("upload-form");
      const fileInput = document.getElementById("file-input");
      const llmBaseUrlInput = document.getElementById("llm-base-url");
      const llmApiKeyInput = document.getElementById("llm-api-key");
      const llmModelNameInput = document.getElementById("llm-model-name");
      const submitBtn = document.getElementById("submit-btn");
      const progressBar = document.getElementById("progress");
      const progressBox = document.getElementById("progress-steps");
      const markdownBox = document.getElementById("markdown");
      const slidesBox = document.getElementById("slides");
      const voiceoverBox = document.getElementById("voiceover");
      const bundleBox = document.getElementById("bundle");
      const methodAssetsBox = document.getElementById("method-assets");
      const imagesBox = document.getElementById("images");
      const errorBox = document.getElementById("error");
      const videoSection = document.getElementById("video-section");
      const videoProgressBar = document.getElementById("video-progress-bar");
      const videoStatusBox = document.getElementById("video-status");
      const btnGenerateVideo = document.getElementById("btn-generate-video");
      const btnDownloadVideo = document.getElementById("btn-download-video");
      const bgColorInput = document.getElementById("bg-color");
      const bgColorValue = document.getElementById("bg-color-value");

      const speedupSection = document.getElementById("speedup-section");
      const speedBtns = document.querySelectorAll(".speed-btn");
      const btnGenerateSpeedup = document.getElementById("btn-generate-speedup");
      const speedupProgressBar = document.getElementById("speedup-progress-bar");
      const speedupStatusBox = document.getElementById("speedup-status");
      const btnDownloadSpeedup = document.getElementById("btn-download-speedup");

      let currentRequestId = null;
      let progressTimer = null;
      let latestProgress = [];
      let currentBundlePath = null;
      let currentRunOutputDir = null;
      let videoJobId = null;
      let videoPollingTimer = null;
      let currentGeneratedVideoPath = null;
      let selectedSpeed = null;
      let speedupJobId = null;
      let speedupPollingTimer = null;

      restoreLlmSettings();
      updateBgColorText();

      bgColorInput.addEventListener("input", updateBgColorText);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        hideError();

        if (!fileInput.files.length) {
          showError("请选择要上传的文件。");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "分析中...";
        progressBar.classList.remove("hidden");
        hideResultBlocks();

        const requestId = window.crypto?.randomUUID?.() || String(Date.now());
        startProgressPolling(requestId);
        saveLlmSettings();

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("request_id", requestId);

        const llmBaseUrl = llmBaseUrlInput.value.trim();
        const llmApiKey = llmApiKeyInput.value.trim();
        const llmModelName = llmModelNameInput.value.trim();
        if (llmBaseUrl) formData.append("llm_base_url", llmBaseUrl);
        if (llmApiKey) formData.append("llm_api_key", llmApiKey);
        if (llmModelName) formData.append("llm_model_name", llmModelName);

        try {
          const response = await fetch("/analyze", { method: "POST", body: formData });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.detail || "分析失败");
          showResult(payload);
        } catch (error) {
          showError(error.message);
        } finally {
          stopProgressPolling();
          progressBar.classList.add("hidden");
          submitBtn.disabled = false;
          submitBtn.textContent = "开始分析";
        }
      });

      function hideResultBlocks() {
        [markdownBox, slidesBox, voiceoverBox, bundleBox, methodAssetsBox, imagesBox].forEach((el) =>
          el.classList.add("hidden")
        );
      }

      function showResult(payload) {
        const { markdown_summary, slides, voice_scripts, progress, bundle_path } = payload;
        const images = payload.images || [];
        const methodAssets = payload.method_assets;
        const layoutDetections = payload.layout_detections || [];

        updateProgressDisplay(progress?.length ? progress : latestProgress);

        if (markdown_summary) {
          markdownBox.textContent = markdown_summary;
          markdownBox.classList.remove("hidden");
        }

        if (slides?.length) {
          slidesBox.textContent = renderSlides(slides);
          slidesBox.classList.remove("hidden");
        }

        if (voice_scripts?.length) {
          voiceoverBox.textContent = renderVoiceScripts(voice_scripts);
          voiceoverBox.classList.remove("hidden");
        }

        if (bundle_path) {
          bundleBox.textContent = `整合文件：${bundle_path}`;
          bundleBox.classList.remove("hidden");
          currentBundlePath = bundle_path;
          currentRunOutputDir = payload.run_output_dir;
          videoSection.classList.remove("hidden");
          videoStatusBox.classList.add("hidden");
          videoProgressBar.classList.add("hidden");
          btnDownloadVideo.classList.add("hidden");
          btnGenerateVideo.disabled = false;
          btnGenerateVideo.textContent = "生成视频";
        } else {
          videoSection.classList.add("hidden");
        }

        if (methodAssets) {
          methodAssetsBox.innerHTML = renderMethodAssets(methodAssets, layoutDetections);
          methodAssetsBox.classList.remove("hidden");
        }

        if (images.length) {
          imagesBox.innerHTML = renderImages(images);
          imagesBox.classList.remove("hidden");
        }
      }

      function startProgressPolling(requestId) {
        stopProgressPolling();
        currentRequestId = requestId;
        latestProgress = [];
        progressBox.textContent = "任务已提交，等待服务端处理...";
        progressBox.classList.remove("hidden");
        progressTimer = setInterval(fetchProgressUpdate, 1500);
        fetchProgressUpdate();
      }

      function stopProgressPolling() {
        if (progressTimer) {
          clearInterval(progressTimer);
          progressTimer = null;
        }
        currentRequestId = null;
      }

      async function fetchProgressUpdate() {
        if (!currentRequestId) return;
        try {
          const response = await fetch(`/progress/${currentRequestId}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) return;
          const data = await response.json();
          latestProgress = data.steps || [];
          updateProgressDisplay(latestProgress);
        } catch (_) {}
      }

      function updateProgressDisplay(steps) {
        if (steps?.length) {
          progressBox.textContent = renderProgress(steps);
        } else {
          progressBox.textContent = "处理中...";
        }
        progressBox.classList.remove("hidden");
      }

      function renderProgress(steps) {
        return (
          "处理进度：\n" +
          steps
            .map((step, index) => {
              const detail = step.detail ? `（${step.detail}）` : "";
              return `${index + 1}. ${step.name} - ${step.status}${detail}`;
            })
            .join("\n")
        );
      }

      function renderSlides(slides) {
        return slides
          .map((slide) => {
            const hook = slide.hook ? `\n${slide.hook}` : "";
            const bullets =
              slide.bullets?.map((point) => `  ${point.startsWith("•") ? point : `• ${point}`}`).join("\n") || "";
            return `第 ${slide.page_id} 页 · ${slide.title}${hook}${bullets ? `\n${bullets}` : ""}`;
          })
          .join("\n\n");
      }

      function renderVoiceScripts(items) {
        return items
          .map((entry) => {
            const closing = entry.closing_sentence ? `\n【收尾】${entry.closing_sentence}` : "";
            return `第 ${entry.page_id} 页 · ${entry.title || ""}\n${entry.voice_over}${closing}`;
          })
          .join("\n\n");
      }

      function renderImages(items) {
        return items
          .map((img) => {
            const caption = `第 ${img.page} 页`;
            if (img.url) {
              return `${caption}\n<img src="${img.url}" alt="p${img.page}" style="max-width:100%;margin-top:8px;">`;
            }
            return `${caption} · ${img.path}`;
          })
          .join("\n\n");
      }

      function renderMethodAssets(assets, layoutDetections) {
        const figures = assets.figures?.length ? assets.figures : assets.figure ? [assets.figure] : [];
        const tables = assets.tables?.length ? assets.tables : assets.table ? [assets.table] : [];
        const sections = [];
        if (figures.length) sections.push(renderAssetList("主图", figures, layoutDetections));
        if (tables.length) sections.push(renderAssetList("主表", tables, layoutDetections));
        return sections.join("\n\n");
      }

      function renderAssetList(label, items, layoutDetections) {
        return (
          `${label}：\n` +
          items
            .map((item, index) => {
              const prefix = items.length > 1 ? `${index + 1}. ` : "";
              const page = item.page ? `第 ${item.page} 页` : "未知页";
              const reason = item.reason ? `\n原因：${item.reason}` : "";
              const url = findCropUrl(item.crop_path, layoutDetections);
              if (url) {
                return `${prefix}${page}\n<img src="${url}" alt="${label}" style="max-width:100%;margin-top:8px;">${reason}`;
              }
              return `${prefix}${page} · ${item.crop_path}${reason}`;
            })
            .join("\n\n")
        );
      }

      function findCropUrl(cropPath, layoutDetections) {
        if (!cropPath || !layoutDetections?.length) return null;
        const match = layoutDetections.find((entry) => entry.crop_path === cropPath);
        return match?.crop_url || null;
      }

      function updateBgColorText() {
        bgColorValue.textContent = String(bgColorInput.value || "#FFFFFF").toUpperCase();
      }

      btnGenerateVideo.addEventListener("click", async () => {
        if (!currentBundlePath || !currentRunOutputDir) return;
        btnGenerateVideo.disabled = true;
        btnGenerateVideo.textContent = "提交中...";
        videoProgressBar.classList.remove("hidden");
        videoStatusBox.textContent = "视频任务已提交，等待生成...";
        videoStatusBox.classList.remove("hidden");
        btnDownloadVideo.classList.add("hidden");
        speedupSection.classList.add("hidden");

        try {
          const response = await fetch("/generate-video", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              bundle_path: currentBundlePath,
              run_output_dir: currentRunOutputDir,
              bg_color: bgColorInput.value,
            }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || "视频生成请求失败");
          videoJobId = data.job_id;
          btnGenerateVideo.textContent = "生成中...";
          startVideoPolling();
        } catch (error) {
          videoStatusBox.textContent = `错误：${error.message}`;
          videoProgressBar.classList.add("hidden");
          btnGenerateVideo.disabled = false;
          btnGenerateVideo.textContent = "生成视频";
        }
      });

      function startVideoPolling() {
        stopVideoPolling();
        videoPollingTimer = setInterval(fetchVideoStatus, 2000);
        fetchVideoStatus();
      }

      function stopVideoPolling() {
        if (videoPollingTimer) {
          clearInterval(videoPollingTimer);
          videoPollingTimer = null;
        }
      }

      async function fetchVideoStatus() {
        if (!videoJobId) return;
        try {
          const response = await fetch(`/video-status/${videoJobId}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) return;
          const data = await response.json();
          const status = data.status;
          if (status === "done") {
            stopVideoPolling();
            videoProgressBar.classList.add("hidden");
            videoStatusBox.textContent = "视频生成完成。";
            btnGenerateVideo.disabled = false;
            btnGenerateVideo.textContent = "重新生成";
            if (data.video_url) {
              currentGeneratedVideoPath = decodeURIComponent(
                data.video_url.replace("/download-video?video_path=", "")
              );
              btnDownloadVideo.href = data.video_url;
              btnDownloadVideo.classList.remove("hidden");
              speedupSection.classList.remove("hidden");
            }
          } else if (status === "failed") {
            stopVideoPolling();
            videoProgressBar.classList.add("hidden");
            videoStatusBox.textContent = "视频生成失败，请查看后端日志。";
            btnGenerateVideo.disabled = false;
            btnGenerateVideo.textContent = "重试";
          } else {
            videoStatusBox.textContent = `视频生成中...（状态：${status}）`;
          }
        } catch (_) {}
      }

      speedBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          speedBtns.forEach((item) => item.classList.remove("selected"));
          btn.classList.add("selected");
          selectedSpeed = parseFloat(btn.dataset.speed);
          btnGenerateSpeedup.disabled = false;
        });
      });

      btnGenerateSpeedup.addEventListener("click", async () => {
        if (!currentGeneratedVideoPath || !selectedSpeed) return;
        btnGenerateSpeedup.disabled = true;
        btnGenerateSpeedup.textContent = "提交中...";
        speedupProgressBar.classList.remove("hidden");
        speedupStatusBox.textContent = "加速任务已提交...";
        speedupStatusBox.classList.remove("hidden");
        btnDownloadSpeedup.classList.add("hidden");

        try {
          const response = await fetch("/speed-up-video", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              video_path: currentGeneratedVideoPath,
              speed_factor: selectedSpeed,
            }),
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || "加速请求失败");
          speedupJobId = data.job_id;
          btnGenerateSpeedup.textContent = "处理中...";
          startSpeedupPolling();
        } catch (error) {
          speedupStatusBox.textContent = `错误：${error.message}`;
          speedupProgressBar.classList.add("hidden");
          btnGenerateSpeedup.disabled = false;
          btnGenerateSpeedup.textContent = "生成加速视频";
        }
      });

      function startSpeedupPolling() {
        if (speedupPollingTimer) clearInterval(speedupPollingTimer);
        speedupPollingTimer = setInterval(fetchSpeedupStatus, 2000);
        fetchSpeedupStatus();
      }

      async function fetchSpeedupStatus() {
        if (!speedupJobId) return;
        try {
          const response = await fetch(`/speed-up-status/${speedupJobId}?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) return;
          const data = await response.json();
          const status = data.status;
          if (status === "done") {
            clearInterval(speedupPollingTimer);
            speedupProgressBar.classList.add("hidden");
            speedupStatusBox.textContent = `${selectedSpeed}x 加速视频已生成。`;
            btnGenerateSpeedup.disabled = false;
            btnGenerateSpeedup.textContent = "重新生成";
            if (data.video_url) {
              btnDownloadSpeedup.href = data.video_url;
              btnDownloadSpeedup.classList.remove("hidden");
            }
          } else if (status === "failed") {
            clearInterval(speedupPollingTimer);
            speedupProgressBar.classList.add("hidden");
            speedupStatusBox.textContent = "加速失败，请查看后端日志。";
            btnGenerateSpeedup.disabled = false;
            btnGenerateSpeedup.textContent = "重试";
          } else {
            speedupStatusBox.textContent = `加速处理中...（状态：${status}）`;
          }
        } catch (_) {}
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.remove("hidden");
      }

      function hideError() {
        errorBox.classList.add("hidden");
      }

      function saveLlmSettings() {
        const payload = {
          base_url: llmBaseUrlInput.value || "",
          model_name: llmModelNameInput.value || "",
        };
        localStorage.setItem("paper2video.llm", JSON.stringify(payload));
      }

      function restoreLlmSettings() {
        try {
          const raw = localStorage.getItem("paper2video.llm");
          if (!raw) return;
          const payload = JSON.parse(raw);
          llmBaseUrlInput.value = payload.base_url || "";
          llmModelNameInput.value = payload.model_name || "";
        } catch (_) {}
      }
    </script>
  </body>
</html>
